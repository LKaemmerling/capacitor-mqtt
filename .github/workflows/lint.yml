name: Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Lint
        run: bun run lint
